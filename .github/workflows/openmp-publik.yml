name: Open.mp Windows Playit Manual

on:
  workflow_dispatch: 

jobs:
  run-server:
    runs-on: windows-latest
    timeout-minutes: 350 

    steps:
      - name: Ambil file dari Repositori
        uses: actions/checkout@v4

      - name: Jalankan Terowongan & Server
        run: |
          Write-Host "Menjalankan Playit.gg langsung dari Repositori..."
          # Langsung mengeksekusi playit.exe yang sudah kamu upload
          Start-Process ./playit.exe -RedirectStandardOutput "playit.log" -NoNewWindow
          
          # Jeda 10 detik agar Playit memunculkan link klaim
          Start-Sleep -Seconds 10
          
          Write-Host "=================================================="
          Write-Host "   BACA LOG DI BAWAH INI UNTUK AKTIVASI SERVER"
          Write-Host "=================================================="
          if (Test-Path "playit.log") { Get-Content "playit.log" }
          Write-Host "=================================================="
          
          Write-Host "Menyalakan server utama open.mp..."
          .\omp-server.exe
        shell: powershell
