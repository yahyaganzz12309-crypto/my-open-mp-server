name: Open.mp Windows Public (Playit.gg Real Fix)

on:
  workflow_dispatch: 

jobs:
  run-server:
    runs-on: windows-latest
    timeout-minutes: 350 

    steps:
      - name: Ambil file dari Repositori
        uses: actions/checkout@v4

      - name: Download Playit.gg Agent
        run: |
          Write-Host "Mengunduh Playit.gg menggunakan URL langsung resmi..."
          # Menggunakan link bypass langsung dari server resmi playit.gg agar tidak tersesat 404
          curl.exe -L -o playit.exe "https://playit.gg/downloads/playit-windows-amd64.exe"
        shell: powershell

      - name: Jalankan Terowongan & Server
        run: |
          # Proteksi: Cek apakah file terunduh dengan benar (di atas 1 MB) atau cuma teks zonk
          $file = Get-Item "playit.exe"
          if ($file.Length -lt 100000) {
              Write-Host "❌ File playit.exe rusak atau terkena internet positif/blokir!"
              exit 1
          }

          Write-Host "Menjalankan Playit.gg di latar belakang..."
          Start-Process ./playit.exe -RedirectStandardOutput "playit.log" -NoNewWindow
          
          # Jeda 10 detik agar sistem Playit membaca server kamu
          Start-Sleep -Seconds 10
          
          Write-Host "=================================================="
          Write-Host "   BACA LOG DI BAWAH INI UNTUK AKTIVASI SERVER"
          Write-Host "=================================================="
          if (Test-Path "playit.log") { Get-Content "playit.log" }
          Write-Host "=================================================="
          
          Write-Host "Menyalakan server utama open.mp..."
          .\omp-server.exe
        shell: powershell
