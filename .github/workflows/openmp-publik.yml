name: Open.mp Linux Public (Ngrok - Bawaan Repo)

on:
  workflow_dispatch: 

jobs:
  run-server:
    runs-on: ubuntu-latest
    timeout-minutes: 350 

    steps:
      - name: Ambil file dari Repositori
        uses: actions/checkout@v4

      - name: Install Ngrok di Server
        run: |
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update && sudo apt-get install ngrok

      - name: Konfigurasi Ngrok Authtoken
        run: ngrok config add-authtoken ${{ secrets.NGROK_AUTHTOKEN }}

      - name: Beri Izin Eksekusi Server (Chmod)
        run: |
          echo "Mengaktifkan izin jalan untuk file Linux..."
          # Memastikan file open.mp dan compiler pawncc bawaan repo kamu bisa dieksekusi oleh sistem Linux
          chmod +x open.mp
          if [ -d "qawno" ]; then chmod +x qawno/pawncc 2>/dev/null || true; fi

      - name: Jalankan Terowongan Publik & Server
        run: |
          echo "Membuka terowongan publik Ngrok (UDP Port 7777)..."
          ngrok udp 7777 --log=stdout > ngrok.log &
          
          # Tunggu 5 detik agar ngrok stabil
          sleep 5
          
          echo "=================================================="
          echo " STATUS: SERVER OPEN.MP PUBLIK ONLINE!"
          echo "=================================================="
          echo "Salin alamat di bawah ini ke Launcher SAMP kamu & teman-teman:"
          
          # Mengambil otomatis IP publik dari Ngrok
          PUBLIC_IP=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url' | sed 's/udp:\/\///')
          echo "👉 $PUBLIC_IP"
          
          echo "=================================================="
          
          # Langsung jalankan file open.mp yang ada di repo kamu
          ./open.mp
