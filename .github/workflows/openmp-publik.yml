name: Open.mp Windows Public (Playit.gg Fixed)

on:
  workflow_dispatch: 

jobs:
  run-server:
    runs-on: windows-latest
    timeout-minutes: 350 

    steps:
      - name: Ambil file dari Repositori
        uses: actions/checkout@v4

      - name: Download Playit.gg Agent
        run: |
          Write-Host "Mengunduh Playit.gg menggunakan curl..."
          # Menggunakan curl.exe bawaan Windows karena jauh lebih stabil dari Invoke-WebRequest
          curl.exe -L -o playit.exe "https://github.com/playit-cloud/playit-agent/releases/latest/download/playit-windows-amd64.exe"
        shell: powershell

      - name: Jalankan Terowongan & Server
        run: |
          Write-Host "Menjalankan Playit.gg di latar belakang..."
          Start-Process ./playit.exe -RedirectStandardOutput "playit.log" -NoNewWindow
          
          # Tunggu 8 detik agar Playit selesai menyiapkan link klaim
          Start-Sleep -Seconds 8
          
          Write-Host "=================================================="
          Write-Host "   BACA LOG DI BAWAH INI UNTUK AKTIVASI SERVER"
          Write-Host "=================================================="
          if (Test-Path "playit.log") { Get-Content "playit.log" }
          Write-Host "=================================================="
          
          Write-Host "Menyalakan server utama open.mp..."
          .\omp-server.exe
        shell: powershell
