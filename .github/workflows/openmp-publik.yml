name: Open.mp Windows Public (Playit.gg)

on:
  workflow_dispatch: 

jobs:
  run-server:
    runs-on: windows-latest
    timeout-minutes: 350 

    steps:
      - name: Ambil file dari Repositori
        uses: actions/checkout@v4

      - name: Download Playit.gg Agent
        run: |
          Write-Host "Mengunduh Playit.gg untuk Windows..."
          # Mengunduh langsung file CLI portable resmi dari Playit.gg
          Invoke-WebRequest -Uri "https://github.com/playit-cloud/playit-agent/releases/latest/download/playit-windows-amd64.exe" -OutFile "playit.exe"
        shell: powershell

      - name: Jalankan Terowongan & Server
        run: |
          Write-Host "Menjalankan Playit.gg di latar belakang..."
          # Menjalankan playit di background dan merekam link aktivasi ke playit.log
          Start-Process ./playit.exe -RedirectStandardOutput "playit.log" -NoNewWindow
          
          # Tunggu 8 detik agar Playit selesai menyiapkan link klaim
          Start-Sleep -Seconds 8
          
          Write-Host "=================================================="
          Write-Host "   BACA LOG DI BAWAH INI UNTUK AKTIVASI SERVER"
          Write-Host "=================================================="
          if (Test-Path "playit.log") { Get-Content "playit.log" }
          Write-Host "=================================================="
          
          Write-Host "Menyalakan server utama open.mp..."
          # Server open.mp kamu otomatis menyala di sini
          .\omp-server.exe
        shell: powershell
