name: Open.mp Linux Playit Official

on:
  workflow_dispatch: 

jobs:
  run-server:
    runs-on: ubuntu-latest
    timeout-minutes: 350 

    steps:
      - name: Ambil file dari Repositori
        uses: actions/checkout@v4

      - name: Install Dependencies 32-bit (Anti Eror Libatomic)
        run: |
          # Mengaktifkan arsitektur 32-bit agar omp-server bisa jalan
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y libatomic1:i386 libc6:i386 libstdc++6:i386 wget

      - name: Download Playit.gg Linux Resmi
        run: |
          echo "Mengunduh Playit.gg versi Linux via wget..."
          # wget di Linux dijamin 100% sukses mendownload file asli sebesar 11MB
          wget -O playit https://github.com/playit-cloud/playit-agent/releases/latest/download/playit-linux-amd64
          chmod +x playit

      - name: Beri Izin Eksekusi Server (Chmod)
        run: |
          chmod +x omp-server
          if [ -d "qawno" ]; then chmod +x qawno/pawncc 2>/dev/null || true; fi

      - name: Jalankan Terowongan & Server
        run: |
          echo "Menjalankan Playit.gg di latar belakang..."
          ./playit > playit.log 2>&1 &
          
          # Jeda 10 detik agar Playit selesai membuat link aktivasi
          sleep 10
          
          echo "=================================================="
          echo "   BACA LOG DI BAWAH INI UNTUK AKTIVASI SERVER"
          echo "=================================================="
          if [ -f "playit.log" ]; then cat playit.log; fi
          echo "=================================================="
          
          echo "Menyalakan server utama open.mp Linux..."
          export LD_LIBRARY_PATH=.:$LD_LIBRARY_PATH
          ./omp-server
