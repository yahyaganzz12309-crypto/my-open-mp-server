name: Open.mp Windows Public Debug

on:
  workflow_dispatch: 

jobs:
  run-server:
    runs-on: windows-latest
    timeout-minutes: 350 

    steps:
      - name: Ambil file dari Repositori
        uses: actions/checkout@v4

      - name: Download & Setup Ngrok Direct
        run: |
          Write-Host "Mengunduh Ngrok versi Windows..."
          Invoke-WebRequest -Uri "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip" -OutFile "ngrok.zip"
          
          Write-Host "Mengekstrak file Ngrok..."
          Expand-Archive -Path "ngrok.zip" -DestinationPath "."
          
          Write-Host "Memasang Authtoken..."
          ./ngrok.exe config add-authtoken ${{ secrets.NGROK_AUTHTOKEN }}
        shell: powershell

      - name: Jalankan Terowongan Publik & Server
        run: |
          Write-Host "Membuka terowongan publik Ngrok (UDP Port 7777)..."
          # Perbaikan: Ngrok dijalankan dengan melempar output log ke file ngrok.log agar bisa diintip
          Start-Process ./ngrok.exe -ArgumentList "udp 7777" -RedirectStandardOutput "ngrok.log" -RedirectStandardError "ngrok_err.log" -NoNewWindow
          
          # Tunggu hingga 15 detik sambil ngecek API Ngrok
          $ip = $null
          for ($i = 1; $i -le 15; $i++) {
              Start-Sleep -Seconds 1
              try {
                  $ngrokApi = Invoke-RestMethod -Uri "http://localhost:4040/api/tunnels"
                  $publicUrl = $ngrokApi.tunnels[0].public_url
                  if ($publicUrl) {
                      $ip = $publicUrl -replace 'udp://', ''
                      break
                  }
              } catch {
                  # Abaikan eror jika API belum siap merespons
              }
          }
          
          Write-Host "=================================================="
          Write-Host " STATUS: SERVER OPEN.MP WINDOWS ONLINE!"
          Write-Host "=================================================="
          
          if ($ip) {
              Write-Host "Salin alamat di bawah ini ke Launcher SAMP kamu & teman-teman:"
              Write-Host "👉 $ip"
              Write-Host "=================================================="
          } else {
              Write-Host "❌ Ngrok Gagal Konek! Menampilkan log internal untuk debug:"
              Write-Host "------------------ START LOG ------------------"
              if (Test-Path "ngrok.log") { Get-Content "ngrok.log" }
              if (Test-Path "ngrok_err.log") { Get-Content "ngrok_err.log" }
              Write-Host "------------------- END LOG -------------------"
              Write-Host "=================================================="
          }
          
          # Jalankan server utama open.mp
          .\omp-server.exe
        shell: powershell
