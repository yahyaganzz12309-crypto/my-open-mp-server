name: Open.mp Server + ngrok

on:
  workflow_dispatch:

jobs:
  openmp:
    runs-on: windows-latest
    timeout-minutes: 350

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download ngrok
        shell: powershell
        run: |
          Write-Host "Downloading ngrok..."

          Invoke-WebRequest `
            -Uri "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip" `
            -OutFile "ngrok.zip"

          Expand-Archive ngrok.zip -DestinationPath .

          .\ngrok.exe version

      - name: Login ngrok
        shell: powershell
        env:
          NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:NGROK_AUTHTOKEN)) {
              Write-Host "NGROK_AUTHTOKEN belum dibuat!"
              exit 1
          }

          .\ngrok.exe config add-authtoken $env:NGROK_AUTHTOKEN

      - name: Cari Open.mp Server
        shell: powershell
        run: |
          $omp = Get-ChildItem -Recurse -Filter "omp-server.exe" | Select-Object -First 1

          if (-not $omp) {
              Write-Host "omp-server.exe tidak ditemukan!"
              exit 1
          }

          echo "OMP_SERVER=$($omp.FullName)" >> $env:GITHUB_ENV

      - name: Jalankan Open.mp
        shell: powershell
        run: |
          Write-Host "Menjalankan Open.mp..."

          Start-Process `
            -FilePath "$env:OMP_SERVER" `
            -WorkingDirectory (Split-Path "$env:OMP_SERVER")

          Start-Sleep 5

      - name: Jalankan ngrok TCP
        shell: powershell
        run: |
          Write-Host "Menjalankan ngrok..."

          Start-Process `
            -FilePath ".\ngrok.exe" `
            -ArgumentList "tcp 7777 --log stdout" `
            -RedirectStandardOutput "ngrok.log" `
            -RedirectStandardError "ngrok-error.log"

      - name: Ambil Host dan Port
        shell: powershell
        run: |
          Write-Host "Menunggu tunnel..."

          $success = $false

          for ($i = 1; $i -le 30; $i++) {

              try {

                  $json = Invoke-RestMethod "http://127.0.0.1:4040/api/tunnels"

                  if ($json.tunnels.Count -gt 0) {

                      $url = $json.tunnels[0].public_url

                      if ($url -match "^tcp://(.+):(\d+)$") {

                          $host = $Matches[1]
                          $port = $Matches[2]

                          Write-Host ""
                          Write-Host "========================================"
                          Write-Host "      OPEN.MP SERVER BERHASIL ONLINE"
                          Write-Host "========================================"
                          Write-Host ""
                          Write-Host "Host : $host"
                          Write-Host "Port : $port"
                          Write-Host ""
                          Write-Host "Alamat Server:"
                          Write-Host "$host`:$port"
                          Write-Host ""
                          Write-Host "========================================"

                          $success = $true
                          break
                      }
                  }

              } catch {
              }

              Start-Sleep 2
          }

          if (-not $success) {

              Write-Host ""
              Write-Host "===== NGROK LOG ====="

              if (Test-Path "ngrok.log") {
                  Get-Content "ngrok.log"
              }

              if (Test-Path "ngrok-error.log") {
                  Get-Content "ngrok-error.log"
              }

              throw "Gagal mendapatkan alamat tunnel."
          }

      - name: Menjaga Workflow Tetap Hidup
        shell: powershell
        run: |
          while ($true) {
              Start-Sleep -Seconds 300
          }
