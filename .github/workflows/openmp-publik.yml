name: Open.mp Windows Public Final

on:
  workflow_dispatch: 

jobs:
  run-server:
    runs-on: windows-latest
    timeout-minutes: 350 

    steps:
      - name: Ambil file dari Repositori
        uses: actions/checkout@v4

      - name: Download & Setup Ngrok Direct
        run: |
          Write-Host "Mengunduh Ngrok versi Windows..."
          Invoke-WebRequest -Uri "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip" -OutFile "ngrok.zip"
          
          Write-Host "Mengekstrak file Ngrok..."
          Expand-Archive -Path "ngrok.zip" -DestinationPath "."
        shell: powershell

      - name: Jalankan Terowongan Publik & Server
        run: |
          Write-Host "Membuat file konfigurasi khusus UDP..."
          # Membuat file ngrok.yml secara otomatis untuk mendaftarkan jalur UDP port 7777
          $configContent = @"
          version: "3"
          agent:
            authtoken: ${{ secrets.NGROK_AUTHTOKEN }}
          tunnels:
            samp:
              proto: udp
              addr: 7777
          "@
          $configContent | Out-File -FilePath "ngrok-config.yml" -Encoding ascii

          Write-Host "Membuka terowongan publik Ngrok via Config..."
          # Menjalankan ngrok dengan memanggil tunnel bernama 'samp' yang sudah dibuat di atas
          Start-Process ./ngrok.exe -ArgumentList "start samp --config ngrok-config.yml" -RedirectStandardOutput "ngrok.log" -RedirectStandardError "ngrok_err.log" -NoNewWindow
          
          # Tunggu hingga 15 detik sampai Ngrok berhasil memetakan IP publik
          $ip = $null
          for ($i = 1; $i -le 15; $i++) {
              Start-Sleep -Seconds 1
              try {
                  $ngrokApi = Invoke-RestMethod -Uri "http://localhost:4040/api/tunnels"
                  $publicUrl = $ngrokApi.tunnels[0].public_url
                  if ($publicUrl) {
                      $ip = $publicUrl -replace 'udp://', ''
                      break
                  }
              } catch {
                  # Abaikan eror sementara menunggu API Ngrok siap
              }
          }
          
          Write-Host "=================================================="
          Write-Host " STATUS: SERVER OPEN.MP WINDOWS ONLINE!"
          Write-Host "=================================================="
          
          if ($ip) {
              Write-Host "Salin alamat di bawah ini ke Launcher SAMP kamu & teman-teman:"
              Write-Host "👉 $ip"
              Write-Host "=================================================="
          } else {
              Write-Host "❌ Ngrok Gagal Konek! Menampilkan log internal untuk debug:"
              Write-Host "------------------ START LOG ------------------"
              if (Test-Path "ngrok.log") { Get-Content "ngrok.log" }
              if (Test-Path "ngrok_err.log") { Get-Content "ngrok_err.log" }
              Write-Host "------------------- END LOG -------------------"
              Write-Host "=================================================="
          }
          
          # Langsung jalankan server utama open.mp Windows kamu
          .\omp-server.exe
        shell: powershell
