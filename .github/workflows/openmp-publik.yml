name: Open.mp Publik Final Fixed

on:
  workflow_dispatch: 

jobs:
  run-server:
    runs-on: ubuntu-latest
    timeout-minutes: 350 

    steps:
      - name: Ambil file dari Repositori
        uses: actions/checkout@v4

      - name: Install Ngrok & Dependencies Linux (32-bit + 64-bit)
        run: |
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          
          # 1. Wajib aktifkan arsitektur i386 (32-bit) di sistem Ubuntu GitHub
          sudo dpkg --add-architecture i386
          sudo apt-get update
          
          # 2. Install ngrok, jq, serta library pendukung versi 32-bit (:i386)
          sudo apt-get install -y ngrok jq libatomic1 libatomic1:i386 libc6:i386 libstdc++6:i386

      - name: Konfigurasi Ngrok Authtoken
        run: ngrok config add-authtoken ${{ secrets.NGROK_AUTHTOKEN }}

      - name: Beri Izin Eksekusi Server (Chmod)
        run: |
          chmod +x omp-server
          if [ -d "qawno" ]; then chmod +x qawno/pawncc 2>/dev/null || true; fi

      - name: Jalankan Terowongan Publik & Server
        run: |
          echo "Membuka terowongan publik Ngrok..."
          ngrok udp 7777 > ngrok.log 2>&1 &
          
          sleep 5
          
          echo "=================================================="
          echo " STATUS: SERVER OPEN.MP PUBLIK ONLINE!"
          echo "=================================================="
          echo "Salin alamat di bawah ini ke Launcher SAMP kamu:"
          
          PUBLIC_IP=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url' | sed 's/udp:\/\///')
          echo "👉 $PUBLIC_IP"
          
          echo "=================================================="
          
          # Mengarahkan folder library lokal agar server mendeteksi file 32-bit dengan mulus
          export LD_LIBRARY_PATH=.:$LD_LIBRARY_PATH
          ./omp-server
