name: Open.mp Windows Playit Auto-Find

on:
  workflow_dispatch:

jobs:
  run-server:
    runs-on: windows-latest
    timeout-minutes: 350

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Jalankan Playit & Open.mp
        shell: powershell
        run: |
          Write-Host "========================================"
          Write-Host " Mencari playit.exe..."
          Write-Host "========================================"

          $playit = Get-ChildItem -Path $PWD -Recurse -Filter "*playit*.exe" | Select-Object -First 1

          if (-not $playit) {
              Write-Host "❌ playit.exe tidak ditemukan!"
              exit 1
          }

          Write-Host "✅ playit ditemukan:"
          Write-Host $playit.FullName

          $playitLog = Join-Path $PWD "playit.log"
          $playitErr = Join-Path $PWD "playit-error.log"

          Start-Process `
            -FilePath $playit.FullName `
            -RedirectStandardOutput $playitLog `
            -RedirectStandardError $playitErr

          Write-Host "Menunggu Playit membuat link..."
          Start-Sleep -Seconds 15

          Write-Host ""
          Write-Host "========== PLAYIT LOG =========="

          if (Test-Path $playitLog) {
              Get-Content $playitLog
          } else {
              Write-Host "playit.log belum dibuat."
          }

          if (Test-Path $playitErr) {
              Write-Host ""
              Write-Host "========== PLAYIT ERROR =========="
              Get-Content $playitErr
          }

          Write-Host ""
          Write-Host "========================================"
          Write-Host " Mencari omp-server.exe..."
          Write-Host "========================================"

          $omp = Get-ChildItem -Path $PWD -Recurse -Filter "omp-server.exe" | Select-Object -First 1

          if (-not $omp) {
              Write-Host "❌ omp-server.exe tidak ditemukan!"
              exit 1
          }

          Write-Host "✅ omp-server ditemukan:"
          Write-Host $omp.FullName

          Write-Host ""
          Write-Host "========================================"
          Write-Host " Menjalankan Open.mp Server"
          Write-Host "========================================"

          & $omp.FullName
