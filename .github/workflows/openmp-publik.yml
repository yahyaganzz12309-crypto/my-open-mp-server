name: Open.mp Windows Public (Ngrok)

on:
  workflow_dispatch: 

jobs:
  run-server:
    runs-on: windows-latest # Menggunakan Windows Server dari GitHub
    timeout-minutes: 350 

    steps:
      - name: Ambil file dari Repositori
        uses: actions/checkout@v4

      - name: Install Ngrok
        run: |
          choco install ngrok -y
        shell: powershell

      - name: Konfigurasi Ngrok Authtoken
        run: |
          ngrok config add-authtoken ${{ secrets.NGROK_AUTHTOKEN }}
        shell: powershell

      - name: Matikan Windows Defender (Biar Ringan & Bebas Lag)
        run: |
          # Mematikan realtime scan agar Windows Defender tidak memakan RAM/CPU server game kamu
          Set-MpPreference -DisableRealtimeMonitoring $true
        shell: powershell

      - name: Jalankan Terowongan Publik & Server
        run: |
          Write-Host "Membuka terowongan publik Ngrok (UDP Port 7777)..."
          # Menjalankan ngrok di latar belakang secara tersembunyi
          Start-Process ngrok -ArgumentList "udp 7777" -WindowStyle Hidden
          
          # Menunggu 5 detik agar Ngrok mendapatkan IP
          Start-Sleep -Seconds 5
          
          # Mengambil otomatis IP publik dari API Ngrok via PowerShell
          try {
              $ngrokApi = Invoke-RestMethod -Uri "http://localhost:4040/api/tunnels"
              $publicUrl = $ngrokApi.tunnels[0].public_url
              $ip = $publicUrl -replace 'udp://', ''
              
              Write-Host "=================================================="
              Write-Host " STATUS: SERVER OPEN.MP WINDOWS ONLINE!"
              Write-Host "=================================================="
              Write-Host "Salin alamat di bawah ini ke Launcher SAMP kamu & teman-teman:"
              Write-Host "👉 $ip"
              Write-Host "=================================================="
          } catch {
              Write-Host "=================================================="
              Write-Host "❌ Gagal mendapatkan IP otomatis di log."
              Write-Host "Tapi server tetap jalan! Silakan cek IP di dashboard.ngrok.com"
              Write-Host "=================================================="
          }
          
          # Langsung jalankan file omp-server.exe bawaan repo kamu
          .\omp-server.exe
        shell: powershell
